worker_processes  1;

events { worker_connections 1024; }

http {
    limit_req_zone $binary_remote_addr zone=rl_web:10m    rate=50r/s;
    limit_req_zone $binary_remote_addr zone=rl_mobile:10m rate=30r/s;

    upstream backend { server localhost:8081; }

    server {
        listen 8080;
        error_page 418 = @api_web;
        error_page 419 = @api_mobile;

        location /api/ {
            if ($http_client_type = "web") { return 418; }
            return 419;
        }

        location @api_web {
            limit_req zone=rl_web burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
        }

        location @api_mobile {
            limit_req zone=rl_mobile burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
        }
    }

    server {
        listen 8081;
        location /api/ {
            add_header Content-Type application/json;
            if ($http_client_type = "web")    { return 200 '{"status":"success","service":"web_backend","data":"Web application response"}'; }
            if ($http_client_type = "mobile") { return 200 '{"status":"success","service":"mobile_backend","data":"Mobile application response"}'; }
            return 200 '{"status":"success","service":"default_backend","data":"Default response"}';
        }
    }
}
